name: build-and-test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: cmake -S . -B build -DBUILD_TESTS=ON

      - name: Build
        run: cmake --build build --config Release -- -j$(nproc)

      - name: Run tests
        working-directory: build
        run: ctest --output-on-failure
